<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 260) rotate(90) scale(420 760)">
      <stop stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(760 380) rotate(90) scale(380 700)">
      <stop stop-color="#3B82F6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text" x1="420" y1="260" x2="820" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#E9D5FF"/>
      <stop offset="1" stop-color="#BFDBFE"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#000000"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <g filter="url(#soft)">
    <text x="110" y="290" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="72" font-weight="700" fill="url(#text)">
      Mastrify Flow
    </text>
    <text x="112" y="360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="34" font-weight="500" fill="#FFFFFF" opacity="0.78">
      AI-powered mix &amp; mastering. Release-ready in seconds.
    </text>
  </g>

  <g opacity="0.7">
    <rect x="110" y="410" width="980" height="2" fill="#FFFFFF" opacity="0.10"/>
    <rect x="110" y="410" width="380" height="2" fill="#8B5CF6" opacity="0.35"/>
    <rect x="490" y="410" width="260" height="2" fill="#3B82F6" opacity="0.28"/>
  </g>
</svg>

